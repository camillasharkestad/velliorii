<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Armbånd | Velliorii</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="category-page">
    <div id="header"></div>

    <section class="products">
      <h2>ARMBÅND</h2>

      <div class="product-grid-5" id="product-container">
        <p>Laster produkter...</p>
      </div>
    </section>

    <div id="footer"></div>
    <script>
      fetch("header.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("header").innerHTML = data;

          const menuToggle = document.getElementById("menu-toggle");
          const navMenu = document.getElementById("nav-menu");

          if (menuToggle && navMenu) {
            menuToggle.addEventListener("click", () => {
              navMenu.classList.toggle("active");
            });
          }

          const cart = JSON.parse(localStorage.getItem("cart")) || [];
          const cartCount = document.getElementById("cart-count");

          if (cartCount) {
            cartCount.textContent = cart.length;
          }
        });
    </script>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const supabaseUrl = "https://amhxnojzpplpfqvxdvug.supabase.co";
      const supabaseKey = "sb_publishable_8gvjzFpSO__9nLfw7lgFHA_eIN2psmW";
      const supabase = createClient(supabaseUrl, supabaseKey);

      async function loadProducts() {
        const container = document.getElementById("product-container");

        const { data, error } = await supabase
          .from("Products")
          .select("name, slug, price, image, category, active, id")
          .eq("category", "armband")
          .eq("active", true)
          .order("id", { ascending: true });

        if (error) {
          console.error("Feil ved henting av produkter:", error);
          container.innerHTML = "<p>Kunne ikke laste produkter.</p>";
          return;
        }

        if (!data || data.length === 0) {
          container.innerHTML = "<p>Ingen produkter funnet.</p>";
          return;
        }

        container.innerHTML = "";

        data.forEach((product) => {
          container.innerHTML += `
  <a href="${product.slug}" class="product-card simple">
    <img src="${product.image}" alt="${product.name}" />
    <h3>${product.name}</h3>
  </a>
`;
        });
      }

      loadProducts();
    </script>

    <script src="footer.js"></script>
    <script src="newsletter.js"></script>
  </body>
</html>
