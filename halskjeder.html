<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <title>Halskjeder</title>

    <!-- CSS din -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- Tittel -->
    <section class="products category-page">
      <h2>Halskjeder</h2>

      <!-- 🔴 VIKTIG: Denne MÅ være der -->
      <div id="product-container" class="product-grid-5"></div>
    </section>

    <!-- SCRIPT -->
    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const supabaseUrl = "https://amhxnojzpplpfqvxdvug.supabase.co";
      const supabaseKey = "sb_publishable_8gvjzFpSO__9nLfw7lgFHA_eIN2psmW";
      const supabase = createClient(supabaseUrl, supabaseKey);

      async function loadProducts() {
        const container = document.getElementById("product-container");

        // 🔴 EKSTRA SIKKERHET
        if (!container) {
          console.error("Fant ikke product-container i HTML!");
          return;
        }

        const { data, error } = await supabase
          .from("Products")
          .select("name, slug, price, image, category, active, id")
          .eq("category", "halskjeder")
          .eq("active", true)
          .order("id", { ascending: true });

        if (error) {
          console.error("Feil:", error);
          container.innerHTML = "<p>Kunne ikke laste produkter.</p>";
          return;
        }

        let html = "";

        data.forEach((product) => {
          html += `
          <a href="${product.slug}.html" class="product-card simple">
            <img src="${product.image}" alt="${product.name}">
            <h3>${product.name}</h3>
            <p>${product.price} kr</p>
          </a>
        `;
        });

        container.innerHTML = html;
      }

      loadProducts();
    </script>
  </body>
</html>
