<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  const supabaseUrl = "https://amhxnojzpplpfqvxdvug.supabase.co";
  const supabaseKey = "sb_publishable_8gvjzFpSO__9nLfw7lgFHA_eIN2psmW";
  const supabase = createClient(supabaseUrl, supabaseKey);

  async function loadProducts() {
    const container = document.getElementById("product-container");

    const { data, error } = await supabase
      .from("Products")
      .select("name, slug, price, image, category, active, id")
      .eq("category", "halskjeder")
      .eq("active", true)
      .order("id", { ascending: true });

    if (error) {
      console.error("Feil ved henting av produkter:", error);
      container.innerHTML = "<p>Kunne ikke laste produkter.</p>";
      return;
    }

    if (!data || data.length === 0) {
      container.innerHTML = "<p>Ingen produkter funnet.</p>";
      return;
    }

    // Bygg HTML først (bedre performance)
    let html = "";

    data.forEach((product) => {
      console.log("Produkt:", product.name);
      console.log("Bilde:", product.image);

      html += `
        <a href="${product.slug}" class="product-card simple">
          <img src="${product.image || "placeholder.jpg"}" alt="${product.name}" />
          <h3>${product.name}</h3>
          <p class="price">${product.price} kr</p>
        </a>
      `;
    });

    container.innerHTML = html;
  }

  loadProducts();
</script>
