<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Handlekurv</title>

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="header"></div>

    <section class="cart-page">
      <div id="cart-items"></div>
      <h3 id="cart-total">Totalt: 0 kr</h3>

      <div id="cart-buttons" class="cart-buttons">
        <button class="buy-button" onclick="clearCart()">Tøm handlekurv</button>
        <button class="buy-button" onclick="checkout()">Fullfør kjøp</button>
      </div>
    </section>

    <footer class="footer">
      <p>Kontakt oss: kontakt@smykker.no</p>
      <p>Tlf: 123 45 678</p>
      <p>© 2026 Smykkebutikk</p>
    </footer>

    <script>
      fetch("header.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("header").innerHTML = data;

          const menuToggle = document.getElementById("menu-toggle");
          const navMenu = document.getElementById("nav-menu");

          if (menuToggle && navMenu) {
            menuToggle.addEventListener("click", () => {
              navMenu.classList.toggle("active");
            });
          }

          updateCartCount();
        });

      function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const cartCount = document.getElementById("cart-count");

        if (cartCount) {
          cartCount.textContent = cart.length;
        }
      }
    </script>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const supabaseUrl = "https://amhxnojzpplpfqvxdvug.supabase.co";
      const supabaseKey = "sb_publishable_8gvjzFpSO__9nLfw7lgFHA_eIN2psmW";
      const supabase = createClient(supabaseUrl, supabaseKey);

      function loadCart() {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const cartItems = document.getElementById("cart-items");
        const cartTotal = document.getElementById("cart-total");
        const cartButtons = document.getElementById("cart-buttons");

        updateCartCount();

        if (cart.length === 0) {
          cartItems.innerHTML = `
            <div class="empty-cart">
              <img
                src="Images/empty-chart.jpg"
                alt="Tom handlekurv"
                class="empty-cart-icon"
              >
              <h2>Din handlekurv er tom</h2>
              <p>Når du legger noe i handlekurven din, vises det her. Klar til å begynne å handle?</p>
              <a href="alle-smykker.html" class="start-shopping">Begynne å handle</a>
            </div>
          `;
          cartTotal.style.display = "none";
          cartButtons.style.display = "none";
          return;
        }

        cartItems.innerHTML = "";
        cartTotal.style.display = "block";
        cartButtons.style.display = "flex";

        let total = 0;

        cart.forEach((item, index) => {
          total += item.price;

          cartItems.innerHTML += `
            <div class="cart-item">
              <img src="${item.image}" alt="${item.name}">
              <div class="cart-item-info">
                <h3>${item.name}</h3>
                <p>${item.price} kr</p>
                <button onclick="removeFromCart(${index})">Fjern</button>
              </div>
            </div>
          `;
        });

        cartTotal.textContent = "Totalt: " + total + " kr";
      }

      function removeFromCart(index) {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        loadCart();
      }

      function clearCart() {
        localStorage.removeItem("cart");
        loadCart();
      }

      async function checkout() {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];

        if (cart.length === 0) {
          alert("Handlekurven er tom.");
          return;
        }

        const productCounts = {};

        cart.forEach((item) => {
          productCounts[item.name] = (productCounts[item.name] || 0) + 1;
        });

        for (const productName in productCounts) {
          const { data, error } = await supabase
            .from("Products")
            .select("stock")
            .eq("name", productName)
            .single();

          if (error) {
            alert("Feil ved henting av lager for " + productName);
            return;
          }

          if (!data) {
            alert("Produktet " + productName + " ble ikke funnet.");
            return;
          }

          if (data.stock < productCounts[productName]) {
            alert(
              productName +
                " har ikke nok på lager. Du har lagt " +
                productCounts[productName] +
                " i handlekurven, men vi har bare " +
                data.stock +
                " igjen.",
            );
            return;
          }
        }

        for (const productName in productCounts) {
          const { data, error } = await supabase
            .from("Products")
            .select("stock")
            .eq("name", productName)
            .single();

          if (error || !data) {
            alert("Feil ved oppdatering av lager for " + productName);
            return;
          }

          const newStock = data.stock - productCounts[productName];

          const { error: updateError } = await supabase
            .from("Products")
            .update({ stock: newStock })
            .eq("name", productName);

          if (updateError) {
            alert("Kunne ikke oppdatere lager for " + productName);
            return;
          }
        }

        localStorage.removeItem("cart");
        loadCart();

        alert("Takk for kjøpet!");
        window.location.href = "index.html";
      }

      window.removeFromCart = removeFromCart;
      window.clearCart = clearCart;
      window.checkout = checkout;

      loadCart();
    </script>
  </body>
</html>
