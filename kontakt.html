<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontakt oss</title>

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="header"></div>

    <main class="contact-page">
      <h1>Kontakt oss</h1>
      <p>
        Har du spørsmål om produkter, bestilling eller levering, kan du kontakte
        oss her:
      </p>

      <div class="contact-box">
        <p><strong>E-post:</strong> kontakt@smykker.no</p>
        <p><strong>Telefon:</strong> 123 45 678</p>
        <p><strong>Adresse:</strong> Eksempelveien 12, 5000 Bergen</p>
        <p><strong>Åpningstider:</strong> Mandag–fredag: 10:00–18:00</p>
      </div>
    </main>

   <div id="footer"></div>

    <script>
      fetch("header.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("header").innerHTML = data;

          const menuToggle = document.getElementById("menu-toggle");
          const navMenu = document.getElementById("nav-menu");

          if (menuToggle && navMenu) {
            menuToggle.addEventListener("click", () => {
              navMenu.classList.toggle("active");
            });
          }

          const cart = JSON.parse(localStorage.getItem("cart")) || [];
          const cartCount = document.getElementById("cart-count");

          if (cartCount) {
            cartCount.textContent = cart.length;
          }
        });
    </script>
    <script src="footer.js"></script>
<script src="newsletter.js"></script>

  </body>
</html>
